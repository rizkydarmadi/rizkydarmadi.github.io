    <main class="flex-grow pt-32 pb-20">
        <div class="container mx-auto px-6 max-w-3xl">
            <h1 class="text-4xl font-bold text-white mb-2 text-center">Artikel & Catatan</h1>
            <p class="text-center text-gray-400 mb-10">Kumpulan tulisan mengenai teknologi, coding, dan pengalaman saya.</p>

            <div class="relative mb-10">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fas fa-search text-gray-500"></i>
                </div>
                <input type="text" id="input-pencarian" class="block w-full bg-gray-800 border border-gray-700 text-white rounded-lg pl-12 py-4 focus:ring-cyan-500 focus:border-cyan-500 transition-colors shadow-lg" placeholder="Cari judul artikel...">
            </div>

            <div id="daftar-blog" class="space-y-6">
                <p id="loading-text" class="text-center text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat artikel...</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 border-t border-gray-800">
        <div class="container mx-auto px-6 py-8 text-center text-gray-400">
            <p>&copy; 2025 Rizky Darmadi</p>
        </div>
    </footer>

    <script>
        let semuaArtikel = []; // Tempat menyimpan data mentah

        // 1. Ambil data JSON
        fetch('data-blog.json')
            .then(response => response.json())
            .then(data => {
                semuaArtikel = data; // Simpan ke memori
                document.getElementById('loading-text').style.display = 'none';
                tampilkanArtikel(semuaArtikel); // Tampilkan semua saat pertama kali dimuat
            })
            .catch(error => {
                console.error('Gagal:', error);
                document.getElementById('loading-text').innerHTML = 'Belum ada artikel saat ini.';
            });

        // 2. Fungsi untuk menggambar HTML berdasarkan data
        function tampilkanArtikel(dataArtikel) {
            const wadah = document.getElementById('daftar-blog');
            wadah.innerHTML = ''; // Kosongkan wadah dulu

            if(dataArtikel.length === 0) {
                wadah.innerHTML = '<p class="text-center text-gray-500 py-8">Artikel tidak ditemukan.</p>';
                return;
            }

            dataArtikel.forEach(post => {
                wadah.innerHTML += `
                    <a href="artikel.html?post=${post.file}" class="block bg-gray-800/50 p-6 rounded-xl hover:bg-gray-800 transition-all duration-300 border border-gray-800 hover:border-cyan-500 group">
                        <div class="flex flex-col gap-2">
                            <h3 class="text-2xl font-bold text-white group-hover:text-cyan-400 transition-colors">${post.judul}</h3>
                            <span class="text-sm text-gray-400 flex items-center">
                                <i class="far fa-calendar-alt mr-2 text-cyan-500"></i> ${post.tanggal}
                            </span>
                        </div>
                    </a>
                `;
            });
        }

        // 3. Fitur Pencarian Real-time
        document.getElementById('input-pencarian').addEventListener('input', function(e) {
            const kataKunci = e.target.value.toLowerCase();
            
            // Saring artikel yang judulnya mengandung kata kunci pencarian
            const artikelDisaring = semuaArtikel.filter(post => 
                post.judul.toLowerCase().includes(kataKunci)
            );
            
            tampilkanArtikel(artikelDisaring);
        });

        const btnMenu = document.getElementById('btn-mobile-menu');
    const mobileMenu = document.getElementById('mobile-menu');
    const ikonMenu = document.getElementById('ikon-menu');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    // Buka/Tutup menu saat tombol diklik
    btnMenu.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');

        // Ubah ikon hamburger (bars) jadi tanda silang (times) saat menu terbuka
        if (mobileMenu.classList.contains('hidden')) {
            ikonMenu.classList.remove('fa-times');
            ikonMenu.classList.add('fa-bars');
        } else {
            ikonMenu.classList.remove('fa-bars');
            ikonMenu.classList.add('fa-times');
        }
    });

    // Otomatis tutup menu saat link diklik (supaya ga nutupin layar)
    mobileLinks.forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            ikonMenu.classList.remove('fa-times');
            ikonMenu.classList.add('fa-bars');
        });
    });
    </script>
